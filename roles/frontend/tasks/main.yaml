 - name: disable default nginx
   ansible.builtin.command: dnf module disable nginx -y

 - name: enable nginx:1.24
   ansible.builtin.command: dnf module enable nginx:1.24 -y

 - name: install nginx
   ansible.builtin.package:
    name: nginx
    state: installed

 - name: removing default content directory
   ansible.builtin.file:
    path: /usr/share/nginx/html
    state: absent

 - name: create html directory
   ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory

 - name: download frontend application code
   ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /tmp/catalogue.zip

 - name: unzipping the application code
   ansible.builtin.unarchive:
    src: /tmp/catalogue.zip
    dest: /usr/share/nginx/html
    remote_src: yes

 - name: removing dafault content of nginx.conf
   ansible.builtin.file:
    path: /etc/nginx/nginx.conf
    state: absent

 - name: copying nginx.conf file
   ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
   handlers:
    notify: restart nginx

 


